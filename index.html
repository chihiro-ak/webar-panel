<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>

<body>

<a-scene
  mindar-image="imageTargetSrc: targets.mind; smoothing: true; filterMinCF:0.0001; filterBeta: 0.001"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  renderer="alpha: true; preserveDrawingBuffer: true"
>
  <a-entity light="type: ambient; intensity: 1"></a-entity>

  <a-entity id="target0" mindar-image-target="targetIndex: 0">
    <a-plane
      id="character-plane"
      src="character.png"
      width="0.605"
      height="1.55"
      position="0.68 -0.93 0.12"
      material="shader: flat; transparent: true"
      animation__float="
        property: position;
        dir: alternate;
        dur: 2200;
        easing: easeInOutSine;
        loop: true;
        to: 0.68 -0.91 0.12
      "
      animation__sway="
        property: rotation;
        dir: alternate;
        dur: 3200;
        easing: easeInOutSine;
        loop: true;
        to: 0 0 1.2
      "
    ></a-plane>
  </a-entity>

  <a-camera active="true" position="0 0 0"></a-camera>
</a-scene>

</body>
</html>
