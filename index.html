<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebAR Panel</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    :root {
      color-scheme: dark;
      --glass: rgba(9, 12, 18, 0.58);
      --glass-strong: rgba(9, 12, 18, 0.82);
      --line: rgba(255, 255, 255, 0.28);
      --text: #fff8f3;
      --accent: #ffcc4d;
      --accent-strong: #ff4d7d;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #05070a;
      font-family: "Hiragino Sans", "Yu Gothic UI", "Yu Gothic", sans-serif;
      touch-action: manipulation;
    }

    a-scene {
      position: fixed;
      inset: 0;
    }

    .photo-controls {
      position: fixed;
      right: max(18px, env(safe-area-inset-right));
      bottom: calc(22px + env(safe-area-inset-bottom));
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 12px;
      pointer-events: none;
    }

    .capture-button {
      position: relative;
      width: 72px;
      height: 72px;
      padding: 0;
      border: 2px solid rgba(255, 255, 255, 0.88);
      border-radius: 50%;
      background: #ffffff;
      box-shadow:
        0 18px 40px rgba(0, 0, 0, 0.38),
        inset 0 0 0 5px rgba(255, 255, 255, 0.72),
        inset 0 0 0 9px rgba(5, 7, 10, 0.16);
      cursor: pointer;
      pointer-events: auto;
      -webkit-tap-highlight-color: transparent;
    }

    .capture-button::before {
      content: "";
      position: absolute;
      left: 18px;
      top: 14px;
      width: 36px;
      height: 28px;
      border: 3px solid #0a0d13;
      border-radius: 9px;
      background: rgba(255, 255, 255, 0.9);
      opacity: 0.95;
      display: none;
    }

    .capture-button::after {
      content: "";
      position: absolute;
      left: 29px;
      top: 20px;
      width: 14px;
      height: 14px;
      border: 3px solid #0a0d13;
      border-radius: 50%;
      background: transparent;
      display: none;
    }

    .capture-button:active {
      transform: scale(0.94);
    }

    .capture-button[disabled] {
      cursor: wait;
      opacity: 0.62;
    }

    .photo-toast {
      min-width: 156px;
      max-width: min(58vw, 280px);
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--glass);
      color: var(--text);
      font-size: 13px;
      line-height: 1.45;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 160ms ease, transform 160ms ease;
      backdrop-filter: blur(14px);
      pointer-events: none;
    }

    .photo-toast.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .photo-preview {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      padding: max(18px, env(safe-area-inset-top)) 18px max(18px, env(safe-area-inset-bottom));
      background: rgba(0, 0, 0, 0.64);
      backdrop-filter: blur(16px);
    }

    .photo-preview[hidden] {
      display: none;
    }

    .photo-sheet {
      width: min(92vw, 430px);
      max-height: 92vh;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      gap: 14px;
    }

    .photo-preview-image {
      width: 100%;
      max-height: 72vh;
      object-fit: contain;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #111722;
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.48);
    }

    .photo-actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .photo-save,
    .photo-close {
      min-height: 46px;
      border: 1px solid transparent;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
    }

    .photo-save {
      display: inline-grid;
      place-items: center;
      padding: 0 18px;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: #15080e;
    }

    .photo-close {
      padding: 0 16px;
      background: var(--glass-strong);
      color: var(--text);
      border-color: var(--line);
    }

    @media (max-width: 520px) {
      .photo-controls {
        right: 50%;
        transform: translateX(50%);
      }

      .photo-toast {
        position: absolute;
        left: 50%;
        bottom: calc(100% + 12px);
        min-width: 132px;
        transform: translate(-50%, 6px);
      }

      .photo-toast.is-visible {
        transform: translate(-50%, 0);
      }
    }
  </style>
</head>

<body>

<a-scene
  mindar-image="imageTargetSrc: targets.mind; smoothing: true; filterMinCF:0.0001; filterBeta: 0.001"
  color-space="sRGB"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  renderer="colorManagement: true; physicallyCorrectLights: true; preserveDrawingBuffer: true"
>
  <a-entity light="type: ambient; intensity: 1"></a-entity>

  <a-entity id="target0" mindar-image-target="targetIndex: 0">
    <a-entity id="character-billboard">
      <a-plane
        id="character-plane"
        src="character.png"
        width="1"
        height="1"
        position="0 0 0"
        visible="false"
        material="shader: flat; transparent: true; side: double; alphaTest: 0.01"
      ></a-plane>
    </a-entity>
  </a-entity>

  <a-camera active="true" position="0 0 0" look-controls="enabled: false"></a-camera>
</a-scene>

<div class="photo-controls" aria-live="polite">
  <div id="photo-toast" class="photo-toast" role="status"></div>
  <button id="capture-button" class="capture-button" type="button" aria-label="写真を撮る" title="写真を撮る"></button>
</div>

<section id="photo-preview" class="photo-preview" hidden aria-label="撮影した写真">
  <div class="photo-sheet">
    <img id="photo-preview-image" class="photo-preview-image" alt="撮影したAR写真のプレビュー" />
    <div class="photo-actions">
      <a id="photo-save-link" class="photo-save" href="#" download="webar-photo.png">保存</a>
      <button id="photo-close-button" class="photo-close" type="button">閉じる</button>
    </div>
  </div>
</section>

<script>
  AFRAME.registerComponent("camera-facing", {
    init() {
      this.parentQuaternion = new THREE.Quaternion();
      this.inverseParentQuaternion = new THREE.Quaternion();
      this.desiredWorldQuaternion = new THREE.Quaternion();
      this.frontFacingQuaternion = new THREE.Quaternion();
      this.wrapperWorldPosition = new THREE.Vector3();
      this.cameraWorldPosition = new THREE.Vector3();
      this.lookAtMatrix = new THREE.Matrix4();
      this.up = new THREE.Vector3(0, 1, 0);
      this.camera = null;

      this.frontFacingQuaternion.setFromEuler(
        new THREE.Euler(0, Math.PI, 0)
      );
    },

    tick() {
      const parentObject = this.el.parentEl?.object3D;
      const cameraObject = this.camera || this.el.sceneEl.camera;

      if (!parentObject || !cameraObject) {
        return;
      }

      this.camera = cameraObject;

      parentObject.getWorldQuaternion(this.parentQuaternion);
      this.inverseParentQuaternion.copy(this.parentQuaternion).invert();

      this.el.object3D.getWorldPosition(this.wrapperWorldPosition);
      cameraObject.getWorldPosition(this.cameraWorldPosition);

      this.lookAtMatrix.lookAt(
        this.wrapperWorldPosition,
        this.cameraWorldPosition,
        this.up
      );
      this.desiredWorldQuaternion.setFromRotationMatrix(this.lookAtMatrix);
      this.desiredWorldQuaternion.multiply(this.frontFacingQuaternion);

      this.el.object3D.quaternion.copy(this.inverseParentQuaternion);
      this.el.object3D.quaternion.multiply(this.desiredWorldQuaternion);
    }
  });

  const TARGET_IMAGE_WIDTH_PX = 1451;
  const TARGET_IMAGE_HEIGHT_PX = 2048;
  const TARGET_PHYSICAL_HEIGHT_M = 0.297;
  const DESK_HEIGHT_M = 1.0;

  const CHARACTER_IMAGE_SRC = "character.png";
  const CHARACTER_VISIBLE_HEIGHT_M = 2.805;
  const CHARACTER_RIGHT_GAP_M = 0.0;
  const CHARACTER_VERTICAL_OFFSET_M = -0.621;
  const CHARACTER_FORWARD_M = 0.12;
  const IDLE_FLOAT_M = 0.01;
  const IDLE_SWAY_DEG = 1.2;

  const characterBillboard = document.getElementById("character-billboard");
  const characterPlane = document.getElementById("character-plane");

  loadImageSize(CHARACTER_IMAGE_SRC)
    .then(({ width, height }) => {
      const targetPhysicalWidthM =
        TARGET_PHYSICAL_HEIGHT_M * (TARGET_IMAGE_WIDTH_PX / TARGET_IMAGE_HEIGHT_PX);
      const anchorUnitsPerMeter = 1 / targetPhysicalWidthM;
      const characterAspectRatio = width / height;
      const characterPhysicalWidthM =
        CHARACTER_VISIBLE_HEIGHT_M * characterAspectRatio;

      const characterWidthUnits = characterPhysicalWidthM * anchorUnitsPerMeter;
      const characterHeightUnits = CHARACTER_VISIBLE_HEIGHT_M * anchorUnitsPerMeter;

      const targetCenterFromFloorM = DESK_HEIGHT_M + TARGET_PHYSICAL_HEIGHT_M / 2;
      const characterCenterFromFloorM =
        (CHARACTER_VISIBLE_HEIGHT_M / 2) + CHARACTER_VERTICAL_OFFSET_M;

      const positionXUnits = CHARACTER_RIGHT_GAP_M * anchorUnitsPerMeter;
      const positionYUnits =
        (characterCenterFromFloorM - targetCenterFromFloorM) * anchorUnitsPerMeter;
      const positionZUnits = CHARACTER_FORWARD_M * anchorUnitsPerMeter;

      characterBillboard.setAttribute(
        "position",
        `${positionXUnits.toFixed(3)} ${positionYUnits.toFixed(3)} ${positionZUnits.toFixed(3)}`
      );
      characterBillboard.setAttribute("camera-facing", "");

      characterPlane.setAttribute("src", CHARACTER_IMAGE_SRC);
      characterPlane.setAttribute("width", characterWidthUnits.toFixed(3));
      characterPlane.setAttribute("height", characterHeightUnits.toFixed(3));
      characterPlane.setAttribute("visible", "true");
      characterPlane.setAttribute(
        "animation__float",
        [
          "property: position",
          "dir: alternate",
          "dur: 2200",
          "easing: easeInOutSine",
          "loop: true",
          `to: 0 ${(IDLE_FLOAT_M * anchorUnitsPerMeter).toFixed(3)} 0`
        ].join("; ")
      );
      characterPlane.setAttribute(
        "animation__sway",
        [
          "property: rotation",
          "dir: alternate",
          "dur: 3200",
          "easing: easeInOutSine",
          "loop: true",
          `to: 0 0 ${IDLE_SWAY_DEG}`
        ].join("; ")
      );
    })
    .catch((error) => {
      console.error("Failed to load character image size.", error);
    });

  function loadImageSize(src) {
    return new Promise((resolve, reject) => {
      const image = new Image();

      image.addEventListener("load", () => {
        resolve({
          width: image.naturalWidth,
          height: image.naturalHeight
        });
      });
      image.addEventListener("error", reject);
      image.src = src;
    });
  }

  setupPhotoCapture();

  function setupPhotoCapture() {
    const captureButton = document.getElementById("capture-button");
    const toast = document.getElementById("photo-toast");
    const preview = document.getElementById("photo-preview");
    const previewImage = document.getElementById("photo-preview-image");
    const saveLink = document.getElementById("photo-save-link");
    const closeButton = document.getElementById("photo-close-button");
    let currentObjectUrl = "";
    let toastTimer = 0;

    if (!captureButton || !preview || !previewImage || !saveLink || !closeButton) {
      return;
    }

    captureButton.addEventListener("click", async () => {
      captureButton.disabled = true;
      showToast("撮影中...");

      try {
        const blob = await captureArPhoto();
        const fileName = createPhotoFileName();

        if (currentObjectUrl) {
          URL.revokeObjectURL(currentObjectUrl);
        }

        currentObjectUrl = URL.createObjectURL(blob);
        previewImage.src = currentObjectUrl;
        saveLink.href = currentObjectUrl;
        saveLink.download = fileName;
        preview.hidden = false;
        showToast("撮影しました");
      } catch (error) {
        console.error("Failed to capture AR photo.", error);
        showToast(error.message || "撮影に失敗しました");
      } finally {
        captureButton.disabled = false;
      }
    });

    closeButton.addEventListener("click", () => {
      preview.hidden = true;
    });

    preview.addEventListener("click", (event) => {
      if (event.target === preview) {
        preview.hidden = true;
      }
    });

    function showToast(message) {
      if (!toast) {
        return;
      }

      window.clearTimeout(toastTimer);
      toast.textContent = message;
      toast.classList.add("is-visible");
      toastTimer = window.setTimeout(() => {
        toast.classList.remove("is-visible");
      }, 2400);
    }
  }

  async function captureArPhoto() {
    const video = findCameraVideo();
    const arCanvas = findArCanvas();

    if (!video || !video.videoWidth || !video.videoHeight) {
      throw new Error("カメラ映像の準備がまだです");
    }

    if (!arCanvas) {
      throw new Error("AR表示の準備がまだです");
    }

    renderCurrentFrame();
    await nextFrame();

    const outputSize = getCaptureSize(arCanvas);
    const outputCanvas = document.createElement("canvas");
    outputCanvas.width = outputSize.width;
    outputCanvas.height = outputSize.height;

    const context = outputCanvas.getContext("2d", {
      alpha: false,
      desynchronized: true
    });

    if (!context) {
      throw new Error("写真を書き出せませんでした");
    }

    context.fillStyle = "#05070a";
    context.fillRect(0, 0, outputCanvas.width, outputCanvas.height);
    drawCover(context, video, outputCanvas.width, outputCanvas.height);
    context.drawImage(arCanvas, 0, 0, outputCanvas.width, outputCanvas.height);

    return canvasToBlob(outputCanvas);
  }

  function findCameraVideo() {
    const videos = Array.from(document.querySelectorAll("video"));
    return (
      videos.find((video) => video.readyState >= 2 && video.videoWidth && video.videoHeight) ||
      videos.find((video) => video.videoWidth && video.videoHeight) ||
      null
    );
  }

  function findArCanvas() {
    const scene = document.querySelector("a-scene");
    return scene?.renderer?.domElement || scene?.canvas || document.querySelector("canvas");
  }

  function renderCurrentFrame() {
    const scene = document.querySelector("a-scene");

    if (!scene?.renderer || !scene?.object3D || !scene?.camera) {
      return;
    }

    scene.renderer.preserveDrawingBuffer = true;
    scene.renderer.render(scene.object3D, scene.camera);
  }

  function getCaptureSize(arCanvas) {
    const rect = arCanvas.getBoundingClientRect();
    const cssWidth = Math.max(1, Math.round(rect.width || window.innerWidth || 720));
    const cssHeight = Math.max(1, Math.round(rect.height || window.innerHeight || 1280));
    const pixelRatio = Math.min(window.devicePixelRatio || 1, 2);
    const maxSide = 2200;
    const rawWidth = Math.round(cssWidth * pixelRatio);
    const rawHeight = Math.round(cssHeight * pixelRatio);
    const scale = Math.min(1, maxSide / Math.max(rawWidth, rawHeight));

    return {
      width: Math.max(1, Math.round(rawWidth * scale)),
      height: Math.max(1, Math.round(rawHeight * scale))
    };
  }

  function drawCover(context, source, outputWidth, outputHeight) {
    const sourceWidth = source.videoWidth || source.width;
    const sourceHeight = source.videoHeight || source.height;
    const sourceRatio = sourceWidth / sourceHeight;
    const outputRatio = outputWidth / outputHeight;
    let cropX = 0;
    let cropY = 0;
    let cropWidth = sourceWidth;
    let cropHeight = sourceHeight;

    if (sourceRatio > outputRatio) {
      cropWidth = sourceHeight * outputRatio;
      cropX = (sourceWidth - cropWidth) / 2;
    } else {
      cropHeight = sourceWidth / outputRatio;
      cropY = (sourceHeight - cropHeight) / 2;
    }

    context.drawImage(
      source,
      cropX,
      cropY,
      cropWidth,
      cropHeight,
      0,
      0,
      outputWidth,
      outputHeight
    );
  }

  function nextFrame() {
    return new Promise((resolve) => {
      requestAnimationFrame(() => resolve());
    });
  }

  function canvasToBlob(canvas) {
    return new Promise((resolve, reject) => {
      canvas.toBlob((blob) => {
        if (blob) {
          resolve(blob);
        } else {
          reject(new Error("画像データを作れませんでした"));
        }
      }, "image/png");
    });
  }

  function createPhotoFileName() {
    const stamp = new Date()
      .toISOString()
      .replaceAll(":", "")
      .replace(/\.\d{3}Z$/, "Z");
    return `webar-photo-${stamp}.png`;
  }
</script>

</body>
</html>
